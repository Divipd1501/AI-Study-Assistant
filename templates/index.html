<!DOCTYPE html>
<html>

<head>
    <title>AI Study Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

   <body class="bg-light">

<div class="container mt-4">

    <div class="card shadow p-4">

        <h1 class="text-center text-primary">
            AI Study Assistant
        </h1>

        <h4 class="text-center">
            Welcome, {{ user }}
        </h4>

        <hr>

        <div class="row text-center">

            <div class="col-md-4">
                <div class="card bg-primary text-white p-3">
                    <h5>Python</h5>
                    <h3>80%</h3>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card bg-success text-white p-3">
                    <h5>Java</h5>
                    <h3>70%</h3>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card bg-warning text-dark p-3">
                    <h5>HTML</h5>
                    <h3>90%</h3>
                </div>
            </div>

        </div>

        <br>

        <form action="/ask" method="POST">

            <input type="text"
                   name="question"
                   class="form-control"
                   placeholder="Ask your question..."
                   required>

            <br>

           <button class="btn btn-primary">
    <i class="fa-solid fa-robot"></i> Ask AI
</button>

        </form>

        <br>

        <a href="/history" class="btn btn-info">
    <i class="fa-solid fa-clock-rotate-left"></i>
    History
</a>
        <a href="/download" class="btn btn-secondary">
    Download PDF
</a>

        <a href="/quiz/python" class="btn btn-success">
            Python Quiz
        </a>

        <a href="/quiz/java" class="btn btn-warning">
            Java Quiz
        </a>

        <a href="/logout" class="btn btn-danger">
    <i class="fa-solid fa-right-from-bracket"></i>
    Logout
</a>

        <hr>

        <h3>Your Chats</h3>

        {% for chat in history %}

        <div class="card shadow p-3 mb-3">

            <h5>Question:</h5>
            <p>{{ chat[0] }}</p>

            <h5>Answer:</h5>
            <p>{{ chat[1] }}</p>

        </div>

        {% endfor %}

    </div>
<hr>

<form action="/aiquiz" method="POST">

    <input type="text"
           name="topic"
           class="form-control"
           placeholder="Enter topic for AI Quiz"
           required>

    <br>

    <button class="btn btn-success">
        Generate AI Quiz
    </button>

</form>
</div>

</body>

</html>
